name: Publish Mog CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build artifacts and print release output without uploading
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @mog/cli to npm
    runs-on: ubuntu-latest
    environment: npm-production
    concurrency:
      group: npm-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - name: Check CLI version contract
        run: |
          CLI_VERSION=$(node -p "require('./cli/package.json').version")
          SDK_VERSION=$(node -p "require('./runtime/sdk/package.json').version")
          if [ "$CLI_VERSION" != "$SDK_VERSION" ]; then
            echo "@mog/cli version ${CLI_VERSION} does not match @mog-sdk/node ${SDK_VERSION}."
            exit 1
          fi

      - run: pnpm --filter @mog/cli test:npm-local

      - run: pnpm --filter @mog/cli package:skill

      - uses: actions/upload-artifact@v4
        with:
          name: mog-cli-kernel-skill
          path: artifacts/mog-cli-kernel.skill.zip
          if-no-files-found: error

      - name: Publish CLI package
        run: |
          TARBALL=$(ls artifacts/npm/mog-cli-*.tgz)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish "$TARBALL" --access public --dry-run
          else
            npm publish "$TARBALL" --access public
          fi
