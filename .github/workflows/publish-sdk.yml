name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.package_dir }}
    runs-on: ubuntu-latest
    environment: npm-production
    concurrency:
      group: npm-production
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - contracts
          - runtime/sdk
          - runtime/embed
          - runtime/spreadsheet-app
          - views/sheet-view
          - compute/wasm/npm
          - compute/napi/npm/darwin-arm64
          - compute/napi/npm/darwin-x64
          - compute/napi/npm/linux-arm64-gnu
          - compute/napi/npm/linux-arm64-musl
          - compute/napi/npm/linux-x64-gnu
          - compute/napi/npm/linux-x64-musl
          - compute/napi/npm/win32-x64-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:public-artifacts

      - name: Guard production publishes to release branch
        if: ${{ inputs.dry_run == 'false' }}
        working-directory: ${{ matrix.package_dir }}
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+(-[[:alnum:]_.-]+)?)$ ]]; then
            echo "Production publishes must be dispatched from release/vX.Y.Z; got ${GITHUB_REF}."
            exit 1
          fi
          RELEASE_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "${{ matrix.package_dir }} version ${PACKAGE_VERSION} does not match release branch ${GITHUB_REF_NAME} (${RELEASE_VERSION})."
            exit 1
          fi

      - name: Publish package
        working-directory: ${{ matrix.package_dir }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

  package-cli:
    name: Package Mog CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    concurrency:
      group: cli-release-packaging-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C compute/napi build:release

      - run: pnpm --filter @mog/cli package:standalone

      - uses: actions/upload-artifact@v4
        with:
          name: mog-cli-${{ matrix.os }}
          path: artifacts/mog-cli-*.tar.gz
          if-no-files-found: error

  publish-cli:
    name: Publish Mog CLI release
    runs-on: ubuntu-latest
    needs:
      - publish
      - package-cli
    environment: npm-production
    concurrency:
      group: npm-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: mog-cli-*
          path: artifacts
          merge-multiple: true

      - run: pnpm --filter @mog/cli package:skill

      - name: Prepare installer
        run: pnpm --filter @mog/cli package:installer

      - name: Guard production CLI publishes to release branch
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+(-[[:alnum:]_.-]+)?)$ ]]; then
            echo "Production CLI publishes must be dispatched from release/vX.Y.Z; got ${GITHUB_REF}."
            exit 1
          fi
          RELEASE_VERSION="${BASH_REMATCH[1]}"
          CLI_VERSION=$(node -p "require('./cli/package.json').version")
          SDK_VERSION=$(node -p "require('./runtime/sdk/package.json').version")
          if [ "$CLI_VERSION" != "$RELEASE_VERSION" ]; then
            echo "@mog/cli version ${CLI_VERSION} does not match release branch ${GITHUB_REF_NAME} (${RELEASE_VERSION})."
            exit 1
          fi
          if [ "$CLI_VERSION" != "$SDK_VERSION" ]; then
            echo "@mog/cli version ${CLI_VERSION} does not match @mog-sdk/node ${SDK_VERSION}."
            exit 1
          fi

      - name: Publish CLI GitHub release
        env:
          MOG_CLI_RELEASE_DRY_RUN: ${{ inputs.dry_run }}
        run: node cli/scripts/publish-github-release.mjs
