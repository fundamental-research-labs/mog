name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact extension version to publish; must match release/vX.Y.Z and package manifests
        required: false
        type: string
        default: ''
      dry-run:
        description: Build and upload the VSIX without publishing
        required: false
        type: boolean
        default: true
      publish_vs_marketplace:
        description: Publish to the VS Code Marketplace when dry-run is false
        required: false
        type: boolean
        default: true
      publish_open_vsx:
        description: Publish to Open VSX when dry-run is false
        required: false
        type: boolean
        default: true
      run_typecheck:
        description: Run the extension typecheck before packaging
        required: false
        type: boolean
        default: false
      wasm_package_version:
        description: Optional @mog-sdk/wasm version to hydrate into the VSIX; defaults to version
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      version:
        description: Exact extension version to publish; must match release/vX.Y.Z and package manifests
        required: false
        type: string
        default: ''
      dry-run:
        description: Build and upload the VSIX without publishing
        required: false
        type: boolean
        default: true
      publish_vs_marketplace:
        description: Publish to the VS Code Marketplace when dry-run is false
        required: false
        type: boolean
        default: true
      publish_open_vsx:
        description: Publish to Open VSX when dry-run is false
        required: false
        type: boolean
        default: true
      run_typecheck:
        description: Run the extension typecheck before packaging
        required: false
        type: boolean
        default: false
      wasm_package_version:
        description: Optional @mog-sdk/wasm version to hydrate into the VSIX; defaults to version
        required: false
        type: string
        default: ''
    secrets:
      VSCE_PAT:
        required: false
      OVSX_PAT:
        required: false
    outputs:
      extension-version:
        description: Published or packaged VS Code extension version
        value: ${{ jobs.publish.outputs.version }}

concurrency:
  group: publish-vscode-extension

permissions:
  contents: read

env:
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '11.5.0'

jobs:
  publish:
    name: Publish mog-xlsx-editor
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Determine release version
        id: version
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry-run || false }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+(-[[:alnum:]_.-]+)?)$ ]]; then
            RELEASE_VERSION="${BASH_REMATCH[1]}"
            VERSION="${INPUT_VERSION:-$RELEASE_VERSION}"
            if [ "$VERSION" != "$RELEASE_VERSION" ]; then
              echo "::error::Input version ${VERSION} does not match release branch ${GITHUB_REF_NAME} (${RELEASE_VERSION})."
              exit 1
            fi
          elif [ "$DRY_RUN" = "true" ]; then
            VERSION="${INPUT_VERSION:-$(node -p "require('./integrations/vscode/mog-xlsx-editor/package.json').version")}"
            echo "Dry-run candidate validation from ${GITHUB_REF_NAME}; using extension package version ${VERSION}."
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            VERSION="${INPUT_VERSION}"
            if [ -z "$VERSION" ]; then
              echo "::error::VS Code extension publishes from main require an explicit version input."
              exit 1
            fi
            echo "Publishing from main with explicit extension version ${VERSION}."
          else
            echo "::error::VS Code extension publishes must be dispatched from release/vX.Y.Z or main with an explicit version input; got ${GITHUB_REF}."
            exit 1
          fi

          node -e "if (!/^\d+\.\d+\.\d+(-[\w.]+)?$/.test('$VERSION')) { console.error('Invalid semver:', '$VERSION'); process.exit(1); }"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release package versions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          manifests=(
            contracts/package.json
            views/sheet-view/package.json
            runtime/spreadsheet-app/package.json
            runtime/embed/package.json
            runtime/sdk/package.json
            cli/package.json
            compute/napi/npm/darwin-arm64/package.json
            compute/napi/npm/darwin-x64/package.json
            compute/napi/npm/linux-x64-gnu/package.json
            compute/napi/npm/linux-arm64-gnu/package.json
            compute/napi/npm/linux-x64-musl/package.json
            compute/napi/npm/linux-arm64-musl/package.json
            compute/napi/npm/win32-x64-msvc/package.json
            compute/wasm/npm/package.json
            compute/chart-render-wasm/npm/package.json
            integrations/vscode/mog-xlsx-editor/package.json
          )
          for manifest in "${manifests[@]}"; do
            PACKAGE_VERSION=$(node -p "require('./${manifest}').version")
            if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
              echo "::error::${manifest} version ${PACKAGE_VERSION} does not match release ${VERSION}"
              exit 1
            fi
          done

      - name: Check extension identity
        run: |
          EXTENSION_ID=$(node -p "const p=require('./integrations/vscode/mog-xlsx-editor/package.json'); p.publisher + '.' + p.name + '@' + p.version")
          if [ "$EXTENSION_ID" != "mog.mog-xlsx-editor@${{ steps.version.outputs.version }}" ]; then
            echo "::error::Unexpected VS Code extension identity ${EXTENSION_ID}"
            exit 1
          fi
          echo "Packaging ${EXTENSION_ID}"

      - name: Hydrate WASM package assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INPUT_WASM_PACKAGE_VERSION: ${{ inputs.wasm_package_version }}
        run: |
          WASM_PACKAGE_VERSION="${INPUT_WASM_PACKAGE_VERSION:-$VERSION}"
          node -e "if (!/^\d+\.\d+\.\d+(-[\w.]+)?$/.test('$WASM_PACKAGE_VERSION')) { console.error('Invalid @mog-sdk/wasm semver:', '$WASM_PACKAGE_VERSION'); process.exit(1); }"
          echo "Hydrating @mog-sdk/wasm@${WASM_PACKAGE_VERSION} for extension ${VERSION}."
          TARBALL=$(npm pack "@mog-sdk/wasm@${WASM_PACKAGE_VERSION}" --pack-destination "$RUNNER_TEMP")
          mkdir -p "$RUNNER_TEMP/mog-sdk-wasm"
          tar -xzf "$RUNNER_TEMP/$TARBALL" -C "$RUNNER_TEMP/mog-sdk-wasm"
          cp "$RUNNER_TEMP"/mog-sdk-wasm/package/compute_core_wasm* compute/wasm/npm/
          test -f compute/wasm/npm/compute_core_wasm.js
          test -f compute/wasm/npm/compute_core_wasm_bg.wasm

      - run: pnpm --dir integrations/vscode/mog-xlsx-editor test

      - name: Typecheck extension
        if: ${{ inputs.run_typecheck == true }}
        run: pnpm --dir integrations/vscode/mog-xlsx-editor typecheck

      - run: pnpm --dir integrations/vscode/mog-xlsx-editor package

      - uses: actions/upload-artifact@v4
        with:
          name: mog-xlsx-editor-vsix-${{ steps.version.outputs.version }}
          path: integrations/vscode/mog-xlsx-editor/dist/mog-xlsx-editor.vsix
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.dry-run == false && inputs.publish_vs_marketplace != false }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Repository secret VSCE_PAT is not configured."
            exit 1
          fi
          pnpm --dir integrations/vscode/mog-xlsx-editor exec vsce publish \
            --no-dependencies \
            --packagePath dist/mog-xlsx-editor.vsix \
            --pat "$VSCE_PAT"

      - name: Verify Open VSX namespace
        if: ${{ inputs.dry-run == false && inputs.publish_open_vsx != false }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Repository secret OVSX_PAT is not configured."
            exit 1
          fi
          npx --yes ovsx@1.0.0 --pat "$OVSX_PAT" create-namespace mog || \
            echo "Open VSX namespace mog may already exist; verifying token access next."
          npx --yes ovsx@1.0.0 --pat "$OVSX_PAT" verify-pat mog

      - name: Publish to Open VSX
        if: ${{ inputs.dry-run == false && inputs.publish_open_vsx != false }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Repository secret OVSX_PAT is not configured."
            exit 1
          fi
          npx --yes ovsx@1.0.0 --pat "$OVSX_PAT" publish \
            integrations/vscode/mog-xlsx-editor/dist/mog-xlsx-editor.vsix \
            --skip-duplicate
