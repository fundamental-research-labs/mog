[package]
name = "compute-functions"
version = "0.1.0"
publish = false
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "512+ Excel-compatible pure functions for the compute engine"

[dependencies]
value-types = { path = "../types/value-types" }
cell-types = { path = "../types/cell-types" }
compute-formats = { path = "../compute-formats" }
chrono = { workspace = true }
statrs = "0.17"
nalgebra = { version = "0.32", default-features = false, features = ["std"] }
rustc-hash = "2"
thiserror = { workspace = true }
tracing = { workspace = true }
fast-float = "0.2"
rand = "0.8"
regex = "1"
compute-solver = { path = "../compute-solver" }

[features]
# Expose internal SPI modules (helpers, math_primitives, lookup) to compute-core.
# External consumers should NOT enable this feature.
__internal = []

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
