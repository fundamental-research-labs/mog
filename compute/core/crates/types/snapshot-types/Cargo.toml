[package]
name = "snapshot-types"
version = "0.1.0"
publish = false
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "IPC snapshot types for compute-core ↔ TypeScript communication"

[dependencies]
# Foundation types
value-types = { path = "../value-types" }
cell-types = { path = "../cell-types" }
formula-types = { path = "../formula-types" }
# Domain types (for SchemaType, ValidationErrorCode, ValidationSeverity)
domain-types = { path = "../../../../../domain-types", default-features = false }

# Serialization (IPC boundary)
serde = { workspace = true }
serde_json = { workspace = true }
serde_bytes = "0.11"

# Error handling
thiserror = { workspace = true }

[dev-dependencies]
# Drives the `tests/no_bare_f64_at_boundary.rs` build-time gate.
finite-at-boundary-walker = { path = "../finite-at-boundary-walker" }
syn = { version = "2", features = ["full"] }
toml = "1"
