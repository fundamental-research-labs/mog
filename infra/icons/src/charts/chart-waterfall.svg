<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Initial bar (start) - blue -->
<rect x="2" y="6" width="3" height="12" fill="var(--icon-accent-blue, #2563eb)"/>
<!-- Increase bar (floating) - green -->
<rect x="6" y="6" width="3" height="4" fill="var(--icon-accent-green, #16a34a)"/>
<!-- Decrease bar (floating) - orange -->
<rect x="10" y="10" width="3" height="3" fill="var(--icon-accent-orange, #ea580c)"/>
<!-- Increase bar (floating) - green -->
<rect x="14" y="7" width="3" height="6" fill="var(--icon-accent-green, #16a34a)"/>
<!-- Total bar - blue -->
<rect x="18" y="7" width="3" height="11" fill="var(--icon-accent-blue, #2563eb)"/>
<!-- Connecting lines -->
<line x1="5" y1="6" x2="6" y2="6" stroke="currentColor" stroke-width="0.5" stroke-dasharray="1"/>
<line x1="9" y1="10" x2="10" y2="10" stroke="currentColor" stroke-width="0.5" stroke-dasharray="1"/>
<line x1="13" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="0.5" stroke-dasharray="1"/>
</svg>
