<svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Source cell on left (centered) -->
  <rect x="2" y="9.5" width="5" height="5" rx="0.75" />

  <!-- Two target cells on right (stacked) -->
  <rect x="17" y="4" width="5" height="5" rx="0.75" />
  <rect x="17" y="15" width="5" height="5" rx="0.75" />

  <!-- Diverging arrow lines (blue) -->
  <path d="M7 12 L12 12" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <path d="M12 12 L17 6.5" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <path d="M12 12 L17 17.5" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <!-- Arrowheads - angled to match line direction -->
  <polyline points="14,4 17,6.5 15,9" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" fill="none" />
  <polyline points="15,15 17,17.5 14,20" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" fill="none" />
</svg>
