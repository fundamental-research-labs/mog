<svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Two source cells on left (stacked) -->
  <rect x="2" y="4" width="5" height="5" rx="0.75" />
  <rect x="2" y="15" width="5" height="5" rx="0.75" />

  <!-- Target cell on right (centered) -->
  <rect x="17" y="9.5" width="5" height="5" rx="0.75" />

  <!-- Converging arrow lines (blue) -->
  <path d="M7 6.5 L12 12" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <path d="M7 17.5 L12 12" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <!-- Horizontal to target -->
  <path d="M12 12 L17 12" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" />
  <!-- Arrowhead -->
  <polyline points="14.5,9.5 17,12 14.5,14.5" stroke="var(--icon-accent-blue, #2563eb)" stroke-width="2" fill="none" />
</svg>
